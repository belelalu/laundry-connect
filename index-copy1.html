<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laundry System v2</title>
</head>

<body>

<!-- LOGIN -->
<div id="loginView">
  <h3>Login</h3>
  <input id="email" placeholder="email"><br>
  <input id="password" type="password"><br>
  <button onclick="doLogin()">Login</button>
</div>

<!-- APP -->
<div id="appView" style="display:none">

  <h3>Dashboard Laundry</h3>
  <button onclick="logout()">Logout</button>

  <hr>

  <input id="nama" placeholder="nama"><br>
  <input id="hp" placeholder="no wa"><br>
  <input id="berat" placeholder="berat"><br>
  <input id="harga" placeholder="harga"><br>

  <button onclick="add()">Simpan</button>

  <div id="out"></div>

  <hr>

  <h4>Dashboard</h4>
  <div id="dash"></div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxZVQxpqUvh-T7yBjhwH1XATE50c67hOaU9StNZBvMvUfd4kK-MAVSbNa1CY65PS8Q/exec";

// GAS CALL (AMAN)
async function gas(f,d={}){
  const r = await fetch(URL,{
    method:"POST",
    body:JSON.stringify({func:f,...d})
  });

  const text = await r.text();
  console.log("RAW:", text);

  return JSON.parse(text);
}

// LOGIN
async function doLogin(){
  const r = await gas("login",{
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  });

  console.log(r);

  if(r.success){
    localStorage.setItem("u",JSON.stringify(r.data));
    showApp();
  }else{
    alert("Login gagal: " + r.message);
  }
}

// SHOW APP
function showApp(){
  document.getElementById("loginView").style.display="none";
  document.getElementById("appView").style.display="block";
  load();
}

// ADD TRANSAKSI
async function add(){
  const r = await gas("addTransaction",{
    nama: document.getElementById("nama").value,
    hp: document.getElementById("hp").value,
    berat: document.getElementById("berat").value,
    harga: document.getElementById("harga").value
  });

  document.getElementById("out").innerHTML = "Kode: "+r.kode;
  load();
}

// LOAD DASHBOARD
async function load(){
  const r = await gas("getDashboard");

  let h = `
    <p>Income: ${r.data.summary.income}</p>
    <p>Count: ${r.data.summary.count}</p>
    <h5>Latest</h5>
  `;

  r.data.latest.forEach(t=>{
    h += `
      <div>
        ${t.kode} - ${t.nama} - ${t.status}
      </div>
    `;
  });

  document.getElementById("dash").innerHTML = h;
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// AUTO LOGIN
window.onload = ()=>{
  if(localStorage.getItem("u")){
    showApp();
  }
}

</script>

</body>
</html>
