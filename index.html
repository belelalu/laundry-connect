<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laundry Connect</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- TOAST -->
<div id="toast" style="
  position: fixed;
  top: 20px;
  right: 20px;
  background: #16a34a;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  display: none;
  z-index: 9999;
">
</div>

<!-- ================= MODAL ================= -->
<div id="modalCustomer" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">
  <div class="bg-white rounded-2xl w-full max-w-lg p-6 shadow-lg">
    <h2 class="text-xl font-bold mb-4">Tambah Pelanggan</h2>

    <input id="c_nama" placeholder="Nama" class="w-full mb-3 p-3 border rounded-xl">
    <input id="c_hp" placeholder="HP" class="w-full mb-3 p-3 border rounded-xl">
    <textarea id="c_alamat" placeholder="Alamat" class="w-full mb-3 p-3 border rounded-xl"></textarea>

    <div class="flex justify-end gap-2">
      <button onclick="closeCustomer()">Batal</button>
      <button onclick="saveCustomer()" class="bg-teal-600 text-white px-4 py-2 rounded-xl">Simpan</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginView" class="flex h-screen items-center justify-center">
  <div class="bg-white p-6 rounded-xl shadow w-80">
    <input id="email" placeholder="Email" class="w-full mb-3 p-3 border rounded-xl">
    <input id="password" type="password" placeholder="Password" class="w-full mb-3 p-3 border rounded-xl">
    <button onclick="doLogin()" class="w-full bg-teal-600 text-white p-3 rounded-xl">Login</button>
  </div>
</div>

<!-- APP -->
<div id="appView" class="hidden flex">

  <div class="w-60 bg-white p-4">
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('transaksi')">Transaksi</button>
    <button onclick="openCustomer()">+ Pelanggan</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="flex-1 p-6">

    <!-- DASHBOARD -->
    <div id="pageDashboard">
      <h2>Dashboard</h2>
      <p id="income">0</p>
      <p id="count">0</p>
      <div id="list"></div>
    </div>

    <!-- TRANSAKSI -->
    <div id="pageTransaksi" class="hidden">
      <select id="customerSelect" class="w-full mb-2 p-2 border"></select>

      <input id="nama" placeholder="Nama" class="w-full mb-2 p-2 border">
      <input id="hp" placeholder="HP" class="w-full mb-2 p-2 border">
      <input id="berat" placeholder="Berat" class="w-full mb-2 p-2 border">
      <input id="harga" placeholder="Harga" class="w-full mb-2 p-2 border">

      <button onclick="add()" class="bg-green-600 text-white p-2 w-full">Simpan</button>
    </div>

  </div>
</div>

<script>

// ================= TOAST =================
function showToast(message, type="success"){
  const toast = document.getElementById("toast");

  toast.innerText = message;

  toast.style.background = (type === "error") ? "#dc2626" : "#16a34a";
  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display = "none";
  }, 3000);
}

// ================= API =================
const URL = "ISI_URL_KAMU";

async function gas(f,d={}){
  const r = await fetch(URL,{
    method:"POST",
    body:JSON.stringify({func:f,...d})
  });
  return await r.json();
}

let customers = [];

// ================= LOGIN =================
async function doLogin(){
  const r = await gas("login",{ email:email.value, password:password.value });

  if(r.success){
    localStorage.setItem("u",JSON.stringify(r.data));
    showApp();
  }else{
    showToast("Login gagal","error");
  }
}

function showApp(){
  loginView.classList.add("hidden");
  appView.classList.remove("hidden");
  loadDashboard();
  loadCustomers();
}

// ================= CUSTOMER =================
function openCustomer(){ modalCustomer.classList.remove("hidden"); }
function closeCustomer(){ modalCustomer.classList.add("hidden"); }

async function saveCustomer(){
  const r = await gas("addCustomer",{ nama:c_nama.value, hp:c_hp.value, alamat:c_alamat.value });

  if(r.success){
    showToast("Pelanggan tersimpan");
    closeCustomer();
    loadCustomers();
  }
}

async function loadCustomers(){
  const r = await gas("getCustomers");

  customers = r.data;

  let html = "<option value=''>Pilih</option>";
  customers.forEach(c=>{
    html += `<option value="${c.id}">${c.nama}</option>`;
  });

  customerSelect.innerHTML = html;
}

customerSelect.onchange = ()=>{
  const c = customers.find(x => x.id == customerSelect.value);
  if(c){
    nama.value = c.nama;
    hp.value = c.hp;
  }
};

// ================= TRANSAKSI =================
async function add(){

  if(!customerSelect.value){
    showToast("Pilih pelanggan dulu","error");
    return;
  }

  const r = await gas("addTransaction",{
    customer_id: customerSelect.value,
    nama:nama.value,
    hp:hp.value,
    berat:berat.value,
    harga:harga.value
  });

  if(r.success){
    showToast("Berhasil! Kode: " + r.kode);
  }else{
    showToast("Error: " + r.error,"error");
  }

  loadDashboard();
}

// ================= DASHBOARD =================
async function loadDashboard(){
  const r = await gas("getDashboard");

  income.innerText = r.data.summary.income;
  count.innerText = r.data.summary.count;
}

// ================= LOGOUT =================
function logout(){
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
