<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<title>Laundry App</title>
</head>
<body>

<h2>Login</h2>
<input id="email" placeholder="email"><br>
<input id="password" type="password" placeholder="password"><br>
<button onclick="login()">Login</button>

<hr>

<h2>Tambah Transaksi</h2>
<input id="nama" placeholder="nama"><br>
<input id="hp" placeholder="628xxxx"><br>
<input id="berat" placeholder="berat"><br>
<input id="harga" placeholder="harga"><br>
<button onclick="tambah()">Simpan</button>

<hr>
<div id="hasil"></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxZVQxpqUvh-T7yBjhwH1XATE50c67hOaU9StNZBvMvUfd4kK-MAVSbNa1CY65PS8Q/exec";

// 🔌 koneksi ke GAS
async function gas(func, data = {}) {
  const r = await fetch(URL, {
    method: 'POST',
    body: JSON.stringify({ func, ...data })
  });

  const text = await r.text();
  console.log("RAW RESPONSE:", text);

  return JSON.parse(text);
}

// 🔐 LOGIN
async function login() {
  const r = await gas('login', {
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  });

  console.log("LOGIN RESPONSE:", r);

  if (r.success) {

    // 🔥 SIMPAN SESSION
    localStorage.setItem("user", JSON.stringify(r.data));

    // 🔥 PINDAH HALAMAN
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("hasil").innerHTML = "";
    document.querySelector("h2").style.display = "none";
    document.querySelectorAll("input, button")[0].style.display = "none";
    document.querySelectorAll("input, button")[1].style.display = "none";
    document.querySelectorAll("input, button")[2].style.display = "none";

    alert("Login berhasil");

  } else {
    alert("Login gagal");
  }
}
</script>


  <div id="dashboard" style="display:none">
  <h2>Dashboard Laundry</h2>

  <button onclick="logout()">Logout</button>

  <hr>

  <div id="info"></div>
</div>
</html>
