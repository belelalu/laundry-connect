<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TEST LOGIN</title>
</head>

<body>

<div id="login">
  <h3>Login</h3>
  <input id="email" placeholder="email"><br><br>
  <input id="password" type="password" placeholder="password"><br><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
  <h2>Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<script>

const URL = "PASTE_URL_GAS_KAMU_DISINI";

// 🔌 GAS
async function gas(f,d={}){
  const r = await fetch(URL,{
    method:"POST",
    body: JSON.stringify({func:f,...d})
  });

  const text = await r.text();
  console.log("RAW:", text);

  return JSON.parse(text);
}

// 🔐 LOGIN
async function login(){

  alert("LOGIN DIKLIK"); // 🔥 TEST

  const r = await gas("login",{
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  });

  console.log("LOGIN RESULT:", r);

  if(r.success){
    alert("LOGIN SUKSES"); // 🔥 TEST
    show();
  }else{
    alert("LOGIN GAGAL");
  }
}

// 🔄 SHOW DASHBOARD
function show(){
  alert("SHOW DIPANGGIL"); // 🔥 TEST

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// 🔓 LOGOUT
function logout(){
  location.reload();
}

</script>

</body>
</html>
