<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<title>Laundry App</title>
</head>

<body style="font-family: Arial;">

<!-- ================= LOGIN ================= -->
<div id="loginView">
  <h2>Login Laundry</h2>

  <input id="email" placeholder="email"><br><br>
  <input id="password" type="password" placeholder="password"><br><br>

  <button onclick="login()">Login</button>
</div>

<hr>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" style="display:none">

  <h2>Dashboard Laundry</h2>

  <button onclick="logout()">Logout</button>

  <hr>

  <h3>Tambah Transaksi</h3>

  <input id="nama" placeholder="nama"><br><br>
  <input id="hp" placeholder="no wa"><br><br>
  <input id="berat" placeholder="berat"><br><br>
  <input id="harga" placeholder="harga/kg"><br><br>

  <button onclick="tambah()">Simpan</button>

  <div id="hasil"></div>

  <hr>

  <!-- DASHBOARD REAL -->
  <h3>📊 Dashboard Real</h3>

  <div id="summary"></div>

  <hr>

  <h4>🧾 Transaksi Terbaru</h4>
  <div id="latest"></div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxZVQxpqUvh-T7yBjhwH1XATE50c67hOaU9StNZBvMvUfd4kK-MAVSbNa1CY65PS8Q/exec";

// ================= GAS =================
async function gas(func, data = {}) {
  const r = await fetch(URL, {
    method: "POST",
    body: JSON.stringify({ func, ...data })
  });

  const text = await r.text();
  return JSON.parse(text);
}

// ================= LOGIN =================
async function login() {
  const r = await gas("login", {
    email: email.value,
    password: password.value
  });

  if (r.success) {
    localStorage.setItem("user", JSON.stringify(r.data));
    showDashboard();
  } else {
    alert("Login gagal");
  }
}

// ================= SHOW DASHBOARD =================
function showDashboard() {
  document.getElementById("loginView").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  loadDashboard();
}

// ================= ADD TRANSACTION =================
async function tambah() {
  const r = await gas("addTransaction", {
    nama_pelanggan: nama.value,
    hp: hp.value,
    layanan: "Cuci Kering",
    berat: Number(berat.value),
    harga_perkg: Number(harga.value),
    estimasi: new Date()
  });

  document.getElementById("hasil").innerHTML =
    "Kode: <b>" + r.kode_tracking + "</b>";

  loadDashboard();
}

// ================= DASHBOARD REAL =================
async function loadDashboard() {
  const r = await gas("getDashboard");

  // SUMMARY
  document.getElementById("summary").innerHTML = `
    <p>💰 Pendapatan Hari Ini: <b>Rp ${r.data.summary.today_income}</b></p>
    <p>📦 Transaksi Hari Ini: <b>${r.data.summary.today_count}</b></p>
  `;

  // LIST
  let html = "<ul>";

  r.data.latest.forEach(t => {
    html += `
      <li>
        <b>${t.kode_tracking}</b> - ${t.nama_pelanggan} - 
        Rp ${t.total} - ${t.status}
      </li>
    `;
  });

  html += "</ul>";

  document.getElementById("latest").innerHTML = html;
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("user");
  location.reload();
}

// ================= AUTO LOGIN =================
window.onload = function () {
  const user = localStorage.getItem("user");
  if (user) showDashboard();
};

</script>

</body>
</html>
