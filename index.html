<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laundry-Connect</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- LOGIN -->
<div id="loginView" class="flex items-center justify-center h-screen">
  <div class="bg-white p-6 rounded-2xl shadow w-80">
    <h2 class="text-xl font-bold mb-4 text-center">Laundry Login</h2>

    <input id="email" placeholder="Email"
      class="w-full mb-3 p-3 border rounded-xl">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-3 p-3 border rounded-xl">

    <button onclick="doLogin()"
      class="w-full bg-blue-600 text-white p-3 rounded-xl">
      Login
    </button>
  </div>
</div>

<!-- APP -->
<div id="appView" class="hidden">

  <!-- SIDEBAR -->
  <div class="fixed left-0 top-0 h-full w-60 bg-white shadow p-4">
    <h2 class="font-bold text-lg mb-6">Laundry App</h2>

    <button onclick="showPage('dashboard')" class="block mb-3 w-full text-left">📊 Dashboard</button>
    <button onclick="showPage('transaksi')" class="block mb-3 w-full text-left">🧾 Transaksi</button>
    <button onclick="logout()" class="mt-10 text-red-500">Logout</button>
  </div>

  <!-- CONTENT -->
  <div class="ml-60 p-6">

    <!-- DASHBOARD -->
    <div id="pageDashboard">

      <h2 class="text-xl font-bold mb-4">Dashboard</h2>

      <!-- SUMMARY -->
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white p-4 rounded-2xl shadow">
          <p class="text-gray-500 text-sm">Pendapatan Hari Ini</p>
          <p id="income" class="text-xl font-bold">0</p>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow">
          <p class="text-gray-500 text-sm">Transaksi</p>
          <p id="count" class="text-xl font-bold">0</p>
        </div>
      </div>

      <!-- LIST -->
      <div class="bg-white p-4 rounded-2xl shadow">
        <h3 class="font-bold mb-3">Transaksi Terbaru</h3>
        <div id="list"></div>
      </div>

    </div>

    <!-- TRANSAKSI -->
    <div id="pageTransaksi" class="hidden">

      <h2 class="text-xl font-bold mb-4">Tambah Transaksi</h2>

      <div class="bg-white p-4 rounded-2xl shadow max-w-md">

        <input id="nama" placeholder="Nama"
          class="w-full mb-3 p-3 border rounded-xl">

        <input id="hp" placeholder="No WhatsApp"
          class="w-full mb-3 p-3 border rounded-xl">

        <input id="berat" placeholder="Berat"
          class="w-full mb-3 p-3 border rounded-xl">

        <input id="harga" placeholder="Harga/kg"
          class="w-full mb-3 p-3 border rounded-xl">

        <button onclick="add()"
          class="w-full bg-green-600 text-white p-3 rounded-xl">
          Simpan
        </button>

        <div id="out" class="mt-2 text-green-600 text-sm"></div>

      </div>

    </div>

  </div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxZVQxpqUvh-T7yBjhwH1XATE50c67hOaU9StNZBvMvUfd4kK-MAVSbNa1CY65PS8Q/exec";

async function gas(f,d={}){
  const r = await fetch(URL,{
    method:"POST",
    body:JSON.stringify({func:f,...d})
  });
  return await r.json();
}

// LOGIN
async function doLogin(){
  const r = await gas("login",{
    email: email.value,
    password: password.value
  });

  if(r.success){
    localStorage.setItem("u",JSON.stringify(r.data));
    showApp();
  }else{
    alert("Login gagal");
  }
}

// SHOW APP
function showApp(){
  loginView.classList.add("hidden");
  appView.classList.remove("hidden");
  loadDashboard();
}

// NAVIGATION
function showPage(p){
  pageDashboard.classList.add("hidden");
  pageTransaksi.classList.add("hidden");

  if(p==="dashboard") pageDashboard.classList.remove("hidden");
  if(p==="transaksi") pageTransaksi.classList.remove("hidden");
}

// ADD TRANSAKSI
async function add(){
  const r = await gas("addTransaction",{
    nama:nama.value,
    hp:hp.value,
    berat:berat.value,
    harga:harga.value
  });

  out.innerHTML = "Kode: "+r.kode;
  loadDashboard();
}

// LOAD DASHBOARD
async function loadDashboard(){
  const r = await gas("getDashboard");

  income.innerText = "Rp " + r.data.summary.income;
  count.innerText = r.data.summary.count;

  let html="";

  r.data.latest.forEach(t=>{
    html += `
      <div class="flex justify-between border-b py-2">
        <div>
          <p class="font-bold">${t.kode}</p>
          <p class="text-sm text-gray-500">${t.nama}</p>
        </div>
        <div class="text-right">
          <p class="text-sm">${t.status}</p>
          <p class="font-bold">Rp ${t.total}</p>
        </div>
      </div>
    `;
  });

  list.innerHTML = html;
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// AUTO LOGIN
window.onload=()=>{
  if(localStorage.getItem("u")){
    showApp();
  }
}

</script>

</body>
</html>
