<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laundry Connect</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- ================= MODAL PELANGGAN ================= -->
<div id="modalCustomer" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">

  <div class="bg-white rounded-2xl w-full max-w-lg p-6 shadow-lg">

    <h2 class="text-xl font-bold mb-4">Tambah Pelanggan</h2>

    <input id="c_nama" placeholder="Nama Pelanggan"
      class="w-full mb-3 p-3 border rounded-xl">

    <input id="c_hp" placeholder="No WhatsApp"
      class="w-full mb-3 p-3 border rounded-xl">

    <textarea id="c_alamat" placeholder="Alamat"
      class="w-full mb-3 p-3 border rounded-xl"></textarea>

    <div class="flex justify-end gap-2">
      <button onclick="closeCustomer()" class="px-4 py-2">Batal</button>
      <button onclick="saveCustomer()" class="bg-teal-600 text-white px-4 py-2 rounded-xl">
        Simpan
      </button>
    </div>

  </div>

</div>

<!-- ================= LOGIN ================= -->
<div id="loginView" class="flex h-screen">

  <div class="hidden md:flex w-1/2 bg-gradient-to-br from-cyan-700 to-teal-500 text-white p-10 flex-col justify-center">
    <h1 class="text-4xl font-bold mb-4">Laundry Connect</h1>
    <p class="text-lg opacity-90">
      Manajemen laundry modern, pantau transaksi & status cucian pelanggan secara realtime.
    </p>
  </div>

  <div class="flex w-full md:w-1/2 items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow w-80">

      <h2 class="text-2xl font-bold mb-6 text-center">
        Selamat Datang 👋
      </h2>

      <input id="email" placeholder="Email"
        class="w-full mb-3 p-3 border rounded-xl">

      <input id="password" type="password" placeholder="Password"
        class="w-full mb-4 p-3 border rounded-xl">

      <button onclick="doLogin()"
        class="w-full bg-teal-600 hover:bg-teal-700 text-white p-3 rounded-xl">
        Masuk ke Dashboard
      </button>

    </div>
  </div>

</div>

<!-- ================= APP ================= -->
<div id="appView" class="hidden flex">

  <!-- SIDEBAR -->
  <div class="w-64 bg-white shadow-lg min-h-screen p-5">
    <h2 class="text-xl font-bold mb-6 text-teal-600">Laundry Connect</h2>

    <button onclick="showPage('dashboard')" class="block mb-3 w-full text-left p-2 rounded hover:bg-gray-100">
      📊 Dashboard
    </button>

    <button onclick="showPage('transaksi')" class="block mb-3 w-full text-left p-2 rounded hover:bg-gray-100">
      🧾 Transaksi
    </button>

    <button onclick="openCustomer()" class="block mb-3 w-full text-left p-2 rounded hover:bg-gray-100">
      👤 + Pelanggan
    </button>

    <button onclick="logout()" class="mt-10 text-red-500">
      Logout
    </button>
  </div>

  <!-- CONTENT -->
  <div class="flex-1 p-6 bg-gray-100">

    <!-- DASHBOARD -->
    <div id="pageDashboard">

      <h2 class="text-2xl font-bold mb-6">Dashboard</h2>

      <div class="grid md:grid-cols-3 gap-4 mb-6">

        <div class="bg-white p-5 rounded-2xl shadow">
          <p class="text-gray-500 text-sm">Pendapatan Hari Ini</p>
          <p id="income" class="text-2xl font-bold text-teal-600">Rp 0</p>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow">
          <p class="text-gray-500 text-sm">Transaksi</p>
          <p id="count" class="text-2xl font-bold">0</p>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow">
          <p class="text-gray-500 text-sm">Status Sistem</p>
          <p class="text-sm text-green-600 font-semibold">Aktif</p>
        </div>

      </div>

      <div class="bg-white p-5 rounded-2xl shadow">
        <h3 class="font-bold mb-3">Transaksi Terbaru</h3>
        <div id="list"></div>
      </div>

    </div>

    <!-- TRANSAKSI -->
    <div id="pageTransaksi" class="hidden">

      <h2 class="text-2xl font-bold mb-4">Tambah Transaksi</h2>

      <div class="bg-white p-5 rounded-2xl shadow max-w-md">

        <!-- DROPDOWN PELANGGAN -->
        <select id="customerSelect"
          class="w-full mb-3 p-3 border rounded-xl"></select>

        <input id="nama" placeholder="Nama"
          class="w-full mb-3 p-3 border rounded-xl">

        <input id="hp" placeholder="No WhatsApp"
          class="w-full mb-3 p-3 border rounded-xl">

        <input id="berat" placeholder="Berat (Kg)"
          class="w-full mb-3 p-3 border rounded-xl">

        <input id="harga" placeholder="Harga/kg"
          class="w-full mb-3 p-3 border rounded-xl">

        <button onclick="add()"
          class="w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded-xl">
          Simpan
        </button>

        <div id="out" class="mt-3 text-green-600 text-sm"></div>

      </div>

    </div>

  </div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxZVQxpqUvh-T7yBjhwH1XATE50c67hOaU9StNZBvMvUfd4kK-MAVSbNa1CY65PS8Q/exec";

let customers = [];

// ================= API =================
async function gas(f,d={}){
  const r = await fetch(URL,{
    method:"POST",
    body:JSON.stringify({func:f,...d})
  });
  return await r.json();
}

// ================= LOGIN =================
async function doLogin(){
  const r = await gas("login",{
    email: email.value,
    password: password.value
  });

  if(r.success){
    localStorage.setItem("u",JSON.stringify(r.data));
    showApp();
  }else{
    alert("Email / Password salah");
  }
}

// ================= SHOW APP =================
function showApp(){
  loginView.classList.add("hidden");
  appView.classList.remove("hidden");
  loadDashboard();
  loadCustomers();
}

// ================= NAVIGATION =================
function showPage(p){
  pageDashboard.classList.add("hidden");
  pageTransaksi.classList.add("hidden");

  if(p==="dashboard") pageDashboard.classList.remove("hidden");
  if(p==="transaksi") pageTransaksi.classList.remove("hidden");
}

// ================= CUSTOMER =================
function openCustomer(){
  modalCustomer.classList.remove("hidden");
}

function closeCustomer(){
  modalCustomer.classList.add("hidden");
}

async function saveCustomer(){
  const r = await gas("addCustomer",{
    nama: c_nama.value,
    hp: c_hp.value,
    alamat: c_alamat.value
  });

  if(r.success){
    alert("Pelanggan tersimpan");
    closeCustomer();
    loadCustomers();
  }
}

async function loadCustomers(){
  const r = await gas("getCustomers");

  customers = r.data;

  let html = "<option value=''>Pilih Pelanggan</option>";

  customers.forEach(c=>{
    html += `<option value="${c.id}">${c.nama} (${c.hp})</option>`;
  });

  customerSelect.innerHTML = html;
}

// AUTO FILL
customerSelect.onchange = () => {
  const c = customers.find(x => x.id == customerSelect.value);
  if(c){
    nama.value = c.nama;
    hp.value = c.hp;
  }
};

// ================= TRANSAKSI =================
async function add(){
  const r = await gas("addTransaction",{
    customer_id: customerSelect.value,
    nama:nama.value,
    hp:hp.value,
    berat:berat.value,
    harga:harga.value
  });

  out.innerHTML = "Kode: "+r.kode;
  loadDashboard();
}

// ================= DASHBOARD =================
async function loadDashboard(){
  const r = await gas("getDashboard");

  income.innerText = "Rp " + r.data.summary.income;
  count.innerText = r.data.summary.count;

  let html="";

  r.data.latest.forEach(t=>{
    let color = "text-gray-500";

    if(t.status === "Masuk") color = "text-yellow-500";
    if(t.status === "Proses") color = "text-blue-500";
    if(t.status === "Selesai") color = "text-green-600";

    html += `
      <div class="flex justify-between border-b py-2">
        <div>
          <p class="font-bold">${t.kode}</p>
          <p class="text-sm text-gray-500">${t.nama}</p>
        </div>
        <div class="text-right">
          <p class="${color} font-semibold">${t.status}</p>
          <p class="font-bold">Rp ${t.total}</p>
        </div>
      </div>
    `;
  });

  list.innerHTML = html;
}

// ================= LOGOUT =================
function logout(){
  localStorage.clear();
  location.reload();
}

// ================= AUTO LOGIN =================
window.onload=()=>{
  if(localStorage.getItem("u")){
    showApp();
  }
}

</script>

</body>
</html>
