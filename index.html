<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laundry Connect</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- ================= MODAL CUCIAN ================= -->
<div id="modalCucian" class="hidden fixed inset-0 z-50 flex items-center justify-center">
  <div onclick="closeCucian()" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

  <div class="relative bg-white w-full max-w-2xl rounded-2xl shadow-lg p-6">

    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold">Tambah Cucian Baru</h2>
      <button onclick="closeCucian()" class="text-gray-400">✕</button>
    </div>

    <hr class="mb-4">

    <p class="text-sm font-semibold text-teal-600 mb-2">Informasi Pelanggan</p>

    <div class="grid grid-cols-2 gap-3 mb-4">
      <input id="nama_cucian" placeholder="Nama Pelanggan" class="p-3 border rounded-xl">
      <input id="hp_cucian" placeholder="No. WhatsApp" class="p-3 border rounded-xl">
    </div>

    <p class="text-sm font-semibold text-teal-600 mb-2">Detail Cucian</p>

    <div class="grid grid-cols-2 gap-3 mb-4">
      <input id="berat_cucian" placeholder="Berat (Kg)" class="p-3 border rounded-xl">
      <input id="harga_cucian" placeholder="Harga" class="p-3 border rounded-xl">
    </div>

    <textarea id="ket_cucian" placeholder="Keterangan (Optional)" class="w-full p-3 border rounded-xl mb-4 h-28"></textarea>

    <div class="flex justify-end gap-2">
      <button onclick="closeCucian()">Batal</button>
      <button onclick="saveCucian()" class="bg-teal-600 text-white px-4 py-2 rounded-xl">Simpan</button>
    </div>

  </div>
</div>

<!-- LOGIN -->
<div id="loginView" class="flex h-screen">
  <div class="flex w-full items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow w-80">
      <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
      <input id="email" placeholder="Email" class="w-full mb-3 p-3 border rounded-xl">
      <input id="password" type="password" placeholder="Password" class="w-full mb-4 p-3 border rounded-xl">
      <button onclick="doLogin()" class="w-full bg-teal-600 text-white p-3 rounded-xl">Masuk</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appView" class="hidden flex">

<!-- SIDEBAR -->
<div class="w-64 bg-white shadow-lg min-h-screen flex flex-col justify-between">

  <div>
    <div class="p-5 font-bold text-lg border-b text-teal-600">Laundry Connect</div>

    <div class="p-4 space-y-2">
      <button onclick="showPage('dashboard')" class="block w-full text-left p-2 bg-teal-100 rounded">Dashboard</button>
      <button onclick="openCucian()" class="block w-full text-left p-2 rounded hover:bg-gray-100">+ Cucian Baru</button>
    </div>
  </div>

  <div class="p-4 border-t">
    <button onclick="logout()" class="w-full text-red-500">Keluar</button>
  </div>
</div>

<!-- CONTENT -->
<div class="flex-1 p-6">

  <div id="pageDashboard">

    <div class="flex justify-between mb-6">
      <h2 class="text-2xl font-bold">Dashboard</h2>
      <button onclick="openCucian()" class="bg-teal-600 text-white px-4 py-2 rounded">+ Cucian Baru</button>
    </div>

    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="bg-white p-4 rounded shadow">
        <p>Cucian Masuk</p>
        <p id="masuk">0</p>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <p>Proses</p>
        <p id="proses">0</p>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <p>Selesai</p>
        <p id="selesai">0</p>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <p>Pendapatan</p>
        <p id="income">0</p>
      </div>
    </div>

    <div class="bg-white p-4 rounded shadow">
      <h3>Cucian Selesai</h3>
      <div id="list"></div>
    </div>

  </div>

</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxZVQxpqUvh-T7yBjhwH1XATE50c67hOaU9StNZBvMvUfd4kK-MAVSbNa1CY65PS8Q/exec";

async function gas(f,d={}){
  const r = await fetch(URL,{method:"POST",body:JSON.stringify({func:f,...d})});
  return await r.json();
}

function openCucian(){ modalCucian.classList.remove("hidden"); }
function closeCucian(){ modalCucian.classList.add("hidden"); }

async function saveCucian(){
  if(!nama_cucian.value || !hp_cucian.value){ alert("Wajib isi"); return; }

  await gas("addTransaction",{
    nama:nama_cucian.value,
    hp:hp_cucian.value,
    berat:berat_cucian.value,
    harga:harga_cucian.value,
    keterangan:ket_cucian.value
  });

  nama_cucian.value="";
  hp_cucian.value="";
  berat_cucian.value="";
  harga_cucian.value="";
  ket_cucian.value="";

  closeCucian();
  loadDashboard();
}

async function doLogin(){
  const r = await gas("login",{email:email.value,password:password.value});
  if(r.success){ localStorage.setItem("u","1"); showApp(); }
}

function showApp(){
  loginView.classList.add("hidden");
  appView.classList.remove("hidden");
  loadDashboard();
}

async function loadDashboard(){
  const r = await gas("getDashboard");

  income.innerText = r.data.summary.income;

  let masuk=0,proses=0,selesai=0,html="";

  r.data.latest.forEach(t=>{
    if(t.status=="Masuk") masuk++;
    if(t.status=="Proses") proses++;
    if(t.status=="Selesai"){
      selesai++;
      html+=`<div>${t.nama} - Rp ${t.total}</div>`;
    }
  });

  masukEl = document.getElementById("masuk");
  prosesEl = document.getElementById("proses");
  selesaiEl = document.getElementById("selesai");

  masukEl.innerText=masuk;
  prosesEl.innerText=proses;
  selesaiEl.innerText=selesai;

  list.innerHTML = html;
}

function logout(){ localStorage.clear(); location.reload(); }

window.onload=()=>{ if(localStorage.getItem("u")) showApp(); }
</script>

</body>
</html>
