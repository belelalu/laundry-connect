<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<title>Laundry App</title>
</head>

<body style="font-family: Arial, sans-serif;">

<!-- ================= LOGIN ================= -->
<div id="loginView">
  <h2>Login Laundry</h2>

  <input id="email" placeholder="email"><br><br>
  <input id="password" type="password" placeholder="password"><br><br>

  <button onclick="login()">Login</button>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" style="display:none">

  <h2>Dashboard Laundry</h2>

  <button onclick="logout()">Logout</button>

  <hr>

  <!-- TRANSAKSI -->
  <h3>Tambah Transaksi</h3>

  <input id="nama" placeholder="nama"><br><br>
  <input id="hp" placeholder="628xxxx"><br><br>
  <input id="berat" placeholder="berat (kg)"><br><br>
  <input id="harga" placeholder="harga/kg"><br><br>

  <button onclick="tambah()">Simpan</button>

  <hr>

  <div id="hasil"></div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxZVQxpqUvh-T7yBjhwH1XATE50c67hOaU9StNZBvMvUfd4kK-MAVSbNa1CY65PS8Q/exec";

// ================= GAS CONNECT =================
async function gas(func, data = {}) {
  const r = await fetch(URL, {
    method: "POST",
    body: JSON.stringify({ func, ...data })
  });

  const text = await r.text();
  console.log("RAW RESPONSE:", text);

  return JSON.parse(text);
}

// ================= LOGIN =================
async function login() {

  const r = await gas("login", {
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  });

  console.log("LOGIN RESPONSE:", r);

  if (r.success) {

    localStorage.setItem("user", JSON.stringify(r.data));

    showDashboard();

    alert("Login berhasil");

  } else {
    alert("Login gagal");
  }
}

// ================= TAMBAH TRANSAKSI =================
async function tambah() {

  const r = await gas("addTransaction", {
    nama_pelanggan: document.getElementById("nama").value,
    hp: document.getElementById("hp").value,
    layanan: "Cuci Kering",
    berat: Number(document.getElementById("berat").value),
    harga_perkg: Number(document.getElementById("harga").value),
    estimasi: new Date()
  });

  document.getElementById("hasil").innerHTML =
    "Kode Tracking: <b>" + r.kode_tracking + "</b>";
}

// ================= DASHBOARD VIEW =================
function showDashboard() {
  document.getElementById("loginView").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("user");
  location.reload();
}

// ================= AUTO LOGIN =================
window.onload = function () {
  const user = localStorage.getItem("user");

  if (user) {
    showDashboard();
  }
};

</script>

</body>
</html>
