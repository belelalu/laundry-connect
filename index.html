<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laundry FixTrack PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gray-100">

<div id="loginView" class="flex items-center justify-center h-screen">
  <div class="bg-white p-6 rounded-xl shadow w-80">
    <h2 class="text-lg font-bold mb-4 text-center">Login</h2>
    <input id="email" class="w-full mb-2 p-2 border rounded" placeholder="Email">
    <input id="password" type="password" class="w-full mb-2 p-2 border rounded">
    <button onclick="doLogin()" class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
  </div>
</div>

<div id="appView" class="hidden">

<div class="flex">

<!-- SIDEBAR -->
<div class="w-60 bg-white h-screen p-4 shadow">
  <h2 class="font-bold mb-4">Laundry</h2>
  <button onclick="showPage('dash')">Dashboard</button><br>
  <button onclick="showPage('trx')">Transaksi</button><br>
  <button onclick="logout()" class="text-red-500 mt-10">Logout</button>
</div>

<!-- CONTENT -->
<div class="flex-1 p-6">

<!-- DASHBOARD -->
<div id="dashPage">
  <h2 class="text-xl font-bold mb-4">Dashboard</h2>

  <div class="grid grid-cols-2 gap-4 mb-4">
    <div class="bg-white p-4 rounded shadow">
      <p>Income</p>
      <h3 id="income">0</h3>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <p>Transaksi</p>
      <h3 id="count">0</h3>
    </div>
  </div>

  <canvas id="chart"></canvas>

  <div class="bg-white p-4 mt-4 rounded shadow">
    <h3 class="font-bold">Transaksi</h3>
    <div id="list"></div>
  </div>

</div>

<!-- TRANSAKSI -->
<div id="trxPage" class="hidden">

<input id="nama" placeholder="Nama" class="block mb-2 p-2 border">
<input id="hp" placeholder="WA" class="block mb-2 p-2 border">
<input id="berat" placeholder="Berat" class="block mb-2 p-2 border">
<input id="harga" placeholder="Harga" class="block mb-2 p-2 border">

<button onclick="add()" class="bg-green-600 text-white p-2">Simpan</button>

<div id="out"></div>

</div>

</div>
</div>

</div>

<script>

const URL="YOUR_GAS_URL";

async function gas(f,d={}){
  const r=await fetch(URL,{method:"POST",body:JSON.stringify({func:f,...d})});
  return await r.json();
}

async function doLogin(){
  const r=await gas("login",{email:email.value,password:password.value});
  if(r.success){
    localStorage.setItem("u","1");
    showApp();
  }
}

function showApp(){
  loginView.style.display="none";
  appView.style.display="block";
  load();
}

function showPage(p){
  dashPage.style.display="none";
  trxPage.style.display="none";

  if(p=="dash") dashPage.style.display="block";
  if(p=="trx") trxPage.style.display="block";
}

async function add(){
  const r=await gas("addTransaction",{
    nama:nama.value,
    hp:hp.value,
    berat:berat.value,
    harga:harga.value
  });

  out.innerHTML="Kode:"+r.kode;

  // QR + WA
  const link = location.href+"?kode="+r.kode;
  window.open("https://wa.me/"+hp.value+"?text=Tracking:"+link);

  load();
}

async function load(){
  const r=await gas("getDashboard");

  income.innerText=r.data.summary.income;
  count.innerText=r.data.summary.count;

  let html="";

  r.data.latest.forEach(t=>{

    const qr = "https://api.qrserver.com/v1/create-qr-code/?size=80x80&data="+t.kode;

    html+=`
    <div class="border p-2 mb-2">
      ${t.kode} - ${t.nama} - ${t.status}

      <select onchange="updateStatus('${t.kode}',this.value)">
        <option ${t.status=="Masuk"?"selected":""}>Masuk</option>
        <option ${t.status=="Proses"?"selected":""}>Proses</option>
        <option ${t.status=="Selesai"?"selected":""}>Selesai</option>
      </select>

      <br>

      <img src="${qr}">

      <a href="https://wa.me/${t.hp}?text=Kode:${t.kode}" target="_blank">
        Kirim WA
      </a>
    </div>`;
  });

  list.innerHTML=html;

  drawChart(r.data.latest);
}

async function updateStatus(kode,status){
  await gas("updateStatus",{kode,status});
  load();
}

function drawChart(data){
  const ctx=document.getElementById("chart");

  new Chart(ctx,{
    type:"bar",
    data:{
      labels:data.map(x=>x.kode),
      datasets:[{
        label:"Total",
        data:data.map(x=>x.total)
      }]
    }
  });
}

function logout(){
  localStorage.clear();
  location.reload();
}

window.onload=()=>{
  if(localStorage.getItem("u")) showApp();
}

</script>

</body>
</html>
