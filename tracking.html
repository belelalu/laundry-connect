<!DOCTYPE html>
<html>
<body>
<h2>Tracking</h2>
<div id="hasil"></div>
<script>
const URL = "https://script.google.com/u/0/home/projects/1bAjCJwzwGenMrbbfRHKWNGdTebcHkJhGfgRRvSa2XpDEYyf0sH7uQWGZ/exec";
const kode = new URL(location.href).searchParams.get("kode");

fetch(URL,{method:'POST',body:JSON.stringify({func:'trackLaundry',kode})})
.then(r=>r.json())
.then(d=>{
 if(!d.data){hasil.innerHTML='tidak ada';return;}
 hasil.innerHTML = d.data.nama_pelanggan + ' - ' + d.data.status;
});
</script>
</body>
</html>
